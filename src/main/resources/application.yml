sftp:
  source:
    path: /source
    # Source token file extension (optional). If set, files are only picked up when
    # a corresponding token file exists at the source. Leave empty or comment out
    # to pick up files without requiring a token file.
    # token-file-extension: .done
  destination:
    path: /destination
    # Destination token file extension (optional). If set, a token file with this
    # extension is created at the destination after a successful transfer to signal
    # completion (e.g., data.csv -> data.csv.done). Leave empty or comment out to disable.
    token-file-extension: .done
  file:
    pattern: "*.csv"
  # SFTP connection settings (used only when transfer.mode=sftp)
  host: localhost
  port: 22
  username: user
  password: password
  # SSH key-based authentication (optional — if set, takes precedence over password)
  # private-key-file: /path/to/private/key
  # private-key-passphrase: optional-passphrase

# Transfer mode: 'local' for local file system testing, 'sftp' for real SFTP transfers
transfer:
  mode: local

# Local mode directories (used only when transfer.mode=local)
local:
  source:
    path: ${user.dir}/data/source
  destination:
    path: ${user.dir}/data/destination

# Camel configuration
camel:
  springboot:
    main-run-controller: true

# Logging
logging:
  level:
    com.example.camelftp: INFO
    org.apache.camel: INFO

