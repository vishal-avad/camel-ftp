sftp:
  source:
    path: /source
  destination:
    path: /destination
  token:
    file:
      # Token file extension (optional). If set, files are only picked up when a
      # corresponding token file exists at the source, and a token file is created
      # at the destination after transfer. Leave empty or comment out to disable.
      extension: .done
  file:
    pattern: "*.csv"
  # SFTP connection settings (used only when transfer.mode=sftp)
  host: localhost
  port: 22
  username: user
  password: password
  # SSH key-based authentication (optional — if set, takes precedence over password)
  # private-key-file: /path/to/private/key
  # private-key-passphrase: optional-passphrase

# Transfer mode: 'local' for local file system testing, 'sftp' for real SFTP transfers
transfer:
  mode: local

# Local mode directories (used only when transfer.mode=local)
local:
  source:
    path: ${user.dir}/data/source
  destination:
    path: ${user.dir}/data/destination

# Camel configuration
camel:
  springboot:
    main-run-controller: true

# Logging
logging:
  level:
    com.example.camelftp: INFO
    org.apache.camel: INFO

